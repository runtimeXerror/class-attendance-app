services:
  - type: web
    name: class-attendance-backend
    runtime: python
    plan: free   # $0/mo — sleeps after 15 min idle (first request takes 30-50s to wake up)
    region: singapore
    rootDir: backend   # tells Render to operate inside the backend/ folder
    buildCommand: pip install -r requirements.txt
    # startup.py creates tables + seeds the DB on first start
    startCommand: python startup.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENV
        value: production
      # NOTE: No DATABASE_URL set — falls back to local ./attendance.db
      # WARNING: Free plan has NO persistent disk. Database resets on every restart/redeploy.
      # When you upgrade to a paid plan, add:
      #   - key: DATABASE_URL
      #     value: sqlite:////var/data/attendance.db
      # and re-add the `disk:` block below.
